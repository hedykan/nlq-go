<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NLQ - Natural Language Query</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .logo {
            color: white;
            font-size: 28px;
            font-weight: bold;
        }
        .lang-switch {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .lang-switch:hover {
            background: rgba(255,255,255,0.3);
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
        }
        .query-box {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            resize: vertical;
            min-height: 100px;
            transition: border-color 0.3s;
        }
        .query-box:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result-sql {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 14px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .result-data {
            margin-top: 15px;
            font-size: 14px;
            color: #666;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .loading.show {
            display: block;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .feature {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            color: white;
            text-align: center;
        }
        .feature-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .feature-title {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .feature-desc {
            font-size: 13px;
            opacity: 0.8;
        }
        .error {
            background: #ffe0e0;
            color: #d00;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }
        .error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">NLQ</div>
            <button class="lang-switch" onclick="toggleLang()">
                <span id="lang-text">中文</span>
            </button>
        </div>

        <div class="card">
            <h2 id="query-title">自然语言查询</h2>
            <textarea class="query-box" id="query-input" placeholder="输入你的问题..."></textarea>
            <button class="btn" id="query-btn" onclick="executeQuery()">
                <span id="btn-text">执行查询</span>
            </button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
            </div>

            <div class="error" id="error"></div>

            <div class="result" id="result">
                <div class="result-sql" id="sql-output"></div>
                <div class="result-data" id="data-output"></div>
            </div>
        </div>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">🗣️</div>
                <div class="feature-title" data-zh="自然语言" data-en="Natural Language">自然语言</div>
                <div class="feature-desc" data-zh="支持中英文提问" data-en="Support Chinese & English">支持中英文提问</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🔒</div>
                <div class="feature-title" data-zh="安全可靠" data-en="Secure">安全可靠</div>
                <div class="feature-desc" data-zh="只允许SELECT查询" data-en="SELECT-only policy">只允许SELECT查询</div>
            </div>
            <div class="feature">
                <div class="feature-icon">📚</div>
                <div class="feature-title" data-zh="知识库" data-en="Knowledge Base">知识库</div>
                <div class="feature-desc" data-zh="支持业务规则学习" data-en="Business rules learning">支持业务规则学习</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🔄</div>
                <div class="feature-title" data-zh="自学习" data-en="Self-Learning">自学习</div>
                <div class="feature-desc" data-zh="反馈自动优化" data-en="Feedback optimization">反馈自动优化</div>
            </div>
        </div>
    </div>

    <script>
        const translations = {
            zh: {
                queryTitle: '自然语言查询',
                queryPlaceholder: '输入你的问题...',
                btnText: '执行查询',
                langText: '中文',
                errorEmpty: '请输入查询内容',
                errorFailed: '查询失败',
                resultTitle: '查询结果',
                rowsReturned: '条记录',
                duration: '耗时',
                ms: '毫秒',
                feature1Title: '自然语言',
                feature1Desc: '支持中英文提问',
                feature2Title: '安全可靠',
                feature2Desc: '只允许SELECT查询',
                feature3Title: '知识库',
                feature3Desc: '支持业务规则学习',
                feature4Title: '自学习',
                feature4Desc: '反馈自动优化',
            },
            en: {
                queryTitle: 'Natural Language Query',
                queryPlaceholder: 'Enter your question...',
                btnText: 'Execute Query',
                langText: 'English',
                errorEmpty: 'Please enter your query',
                errorFailed: 'Query failed',
                resultTitle: 'Query Result',
                rowsReturned: 'rows',
                duration: 'Duration',
                ms: 'ms',
                feature1Title: 'Natural Language',
                feature1Desc: 'Support Chinese & English',
                feature2Title: 'Secure',
                feature2Desc: 'SELECT-only policy',
                feature3Title: 'Knowledge Base',
                feature3Desc: 'Business rules learning',
                feature4Title: 'Self-Learning',
                feature4Desc: 'Feedback optimization',
            }
        };

        let currentLang = 'zh';
        let lastQuery = '';

        function toggleLang() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            updateUI();
        }

        function updateUI() {
            const t = translations[currentLang];
            
            document.getElementById('lang-text').textContent = t.langText;
            document.getElementById('query-title').textContent = t.queryTitle;
            document.getElementById('query-input').placeholder = t.queryPlaceholder;
            document.getElementById('btn-text').textContent = t.btnText;
            document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
            
            document.querySelectorAll('[data-zh]').forEach(el => {
                el.textContent = el.getAttribute(`data-${currentLang}`);
            });
        }

        async function executeQuery() {
            const query = document.getElementById('query-input').value.trim();
            const t = translations[currentLang];
            
            if (!query) {
                showError(t.errorEmpty);
                return;
            }

            lastQuery = query;
            hideError();
            showLoading(true);
            hideResult();

            try {
                const response = await fetch('http://localhost:8080/api/v1/query', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ question: query })
                });

                const data = await response.json();
                
                if (data.success) {
                    showResult(data.sql, data.count, data.duration_ms);
                } else {
                    showError(data.error || t.errorFailed);
                }
            } catch (err) {
                showError(t.errorFailed + ': ' + err.message);
            } finally {
                showLoading(false);
            }
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.classList.add('show');
        }

        function hideError() {
            document.getElementById('error').classList.remove('show');
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('show', show);
            document.getElementById('query-btn').disabled = show;
        }

        function showResult(sql, count, duration) {
            document.getElementById('sql-output').textContent = sql;
            document.getElementById('data-output').textContent = 
                `${translations[currentLang].rowsReturned}: ${count || 0} | ${translations[currentLang].duration}: ${duration}${translations[currentLang].ms}`;
            document.getElementById('result').classList.add('show');
        }

        function hideResult() {
            document.getElementById('result').classList.remove('show');
        }

        document.getElementById('query-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                executeQuery();
            }
        });
    </script>
</body>
</html>
